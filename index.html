<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>السيرة الذاتية - جبار جدوع العزاوي</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    padding:0;
    background:#f3f3f3;
    font-family:'Cairo', sans-serif;
    text-align:center;
}

.header{
    background:#111;
    color:white;
    padding:60px 20px;
    box-shadow:0 0 15px rgba(0,0,0,0.3);
}

.logo{
    width:120px;
    height:120px;
    border-radius:50%;
    background:white;
    margin:auto;
    overflow:hidden;
    border:4px solid gold;
}

.logo img{
    width:100%;
    height:100%;
    object-fit:cover;
}

h1{
    margin-top:25px;
    font-size:40px;
}

.welcome{
    margin-top:15px;
    font-size:28px;
    color:#ffd700;
}

.content{
    padding:40px;
    font-size:22px;
    color:#333;
}
</style>
</head>

<body>

<div class="header">
    <div class="logo">
        <img src="https://upload.wikimedia.org/wikipedia/commons/a/ac/No_image_available.svg">
    </div>
    <h1>السيرة الذاتية - جبار جدوع العزاوي</h1>
    <div class="welcome">أهلاً وسهلاً بكم</div>
</div>

<div class="content">
    هذا الموقع الرسمي الخاص بعائلة جبار جدوع العزاوي
</div>

</body>
</html>
